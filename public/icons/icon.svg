<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E1E2A"/>
      <stop offset="100%" style="stop-color:#0A0A0F"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A78BFA"/>
      <stop offset="100%" style="stop-color:#7C3AED"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>
  <!-- Clock circle -->
  <circle cx="256" cy="220" r="130" fill="none" stroke="url(#accent)" stroke-width="20"/>
  <!-- Clock hands -->
  <line x1="256" y1="220" x2="256" y2="140" stroke="url(#accent)" stroke-width="18" stroke-linecap="round"/>
  <line x1="256" y1="220" x2="320" y2="255" stroke="#A78BFA" stroke-width="14" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="256" cy="220" r="14" fill="url(#accent)"/>
  <!-- AUD text -->
  <text x="256" y="410" text-anchor="middle" font-family="Arial, sans-serif" font-weight="700" font-size="72" fill="url(#accent)">AUD</text>
</svg>
